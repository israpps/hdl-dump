name: CI

on:
  push:
  pull_request:

jobs:

   build-diskload:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:v1.0
    steps:

    - name: Install dependencies
      run: |
        apk add build-base git zip

    - name: checkout
    - uses: actions/checkout@v2
      run: |
        git fetch --prune --unshallow

    - name: compile
      run: |
            cd diskload
            make
            echo -------------------------------
            ls
            echo -------------------------------

      - name: upload diskload
      - uses: actions/upload-artifact@v2
         with:
          name: diskload
          path: diskload/*.elf


  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
        
    steps:       
    - uses: actions/checkout@v2
        
    - name: Install Ubuntu version
      if: ${{ matrix.os == 'ubuntu-latest' && always() }}
      run: |
        make RELEASE=yes
        sudo apt-get update
        sudo apt-get -y install gcc-mingw-w64-i686 gcc make patch texinfo git 
        make XC=win RELEASE=yes
        make -C gui XC=win RELEASE=yes

    - name: Install Mac version
      if: ${{ matrix.os == 'macos-latest' && always() }}
      run: |
        brew update
        brew install gcc make
        make

    - uses: actions/upload-artifact@v2
      with:
        name: rel/hdl_*
        path: hdl-${{matrix.os}}.zip

